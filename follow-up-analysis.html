<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者关爱项目 - 随访分析</title>
    <link rel="stylesheet" href="design-system.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>患者关爱 BI</h2>
        <ul class="menu">
            <li class="menu-item">
                <a href="index.html">
                    <span style="margin-right: 12px;">📊</span> 首页概览
                </a>
            </li>
            <li class="menu-item">
                <a href="patient-analysis.html">
                    <span style="margin-right: 12px;">👥</span> 患者分析
                </a>
            </li>
            <li class="menu-item active">
                <a href="follow-up-analysis.html">
                    <span style="margin-right: 12px;">📞</span> 随访分析
                </a>
            </li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="container">
            <div class="header">
                <h1>随访分析</h1>
                <div style="color: var(--text-muted); font-size: 14px;">数据更新至：2026-04-23</div>
            </div>
            
            <div class="metrics-grid">
                <div class="metric-card" style="--primary-color: #38bdf8;">
                    <div class="label">随访完成率</div>
                    <div class="value">85.7%</div>
                    <div class="change positive">↑ 2.3%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #10b981;">
                    <div class="label">有效随访率</div>
                    <div class="value">78.2%</div>
                    <div class="change positive">↑ 1.8%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #f59e0b;">
                    <div class="label">失访率</div>
                    <div class="value">12.5%</div>
                    <div class="change negative">↓ 0.8%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #8b5cf6;">
                    <div class="label">患者脱落率</div>
                    <div class="value">8.3%</div>
                    <div class="change negative">↓ 0.5%</div>
                </div>
            </div>
            
            <div class="charts-grid" style="grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));">
                <div class="chart-container">
                    <h3>随访率月度趋势</h3>
                    <div id="followUpRateChart" class="chart"></div>
                </div>
                
                <div class="chart-container">
                    <h3>失访率月度趋势</h3>
                    <div id="lossRateChart" class="chart"></div>
                </div>
                
                <div class="chart-container">
                    <h3>患者 AE 上报月度趋势</h3>
                    <div id="aeReportChart" class="chart"></div>
                </div>
                
                <div class="chart-container">
                    <h3>患者脱落率月度趋势</h3>
                    <div id="dropoutRateChart" class="chart"></div>
                </div>
                
                <div class="chart-container">
                    <h3>患者脱落原因占比</h3>
                    <div id="dropoutReasonChart" class="chart"></div>
                </div>
                
                <div class="chart-container">
                    <h3>患者 AE 不良反应占比</h3>
                    <div id="aeAdverseChart" class="chart"></div>
                </div>
            </div>
            
            <div class="footer">
                <p>© 2026 患者关爱项目管理系统 · 专业版</p>
            </div>
        </div>
    </div>

    
    <script>
        window.onload = function() {
            const commonTooltip = {
                backgroundColor: 'rgba(30, 41, 59, 0.9)',
                borderColor: 'rgba(255, 255, 255, 0.1)',
                borderWidth: 1,
                textStyle: { color: '#f1f5f9' },
                backdropFilter: 'blur(4px)'
            };

            const chartConfigs = [
                { id: 'followUpRateChart', name: '随访率', color: '#38bdf8', type: 'line', area: true },
                { id: 'lossRateChart', name: '失访率', color: '#f59e0b', type: 'line', area: true },
                { id: 'dropoutRateChart', name: '脱落率', color: '#8b5cf6', type: 'line', area: true }
            ];

            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            const dataMap = {
                followUpRateChart: [75.2, 77.5, 79.8, 81.2, 82.5, 83.7, 84.3, 84.8, 85.2, 85.5, 85.6, 85.7],
                lossRateChart: [15.8, 15.2, 14.7, 14.2, 13.8, 13.5, 13.2, 12.9, 12.8, 12.7, 12.6, 12.5],
                dropoutRateChart: [10.2, 10.0, 9.8, 9.5, 9.2, 9.0, 8.8, 8.6, 8.5, 8.4, 8.3, 8.3]
            };

            const instances = [];

            chartConfigs.forEach(config => {
                const chart = echarts.init(document.getElementById(config.id));
                instances.push(chart);
                chart.setOption({
                    tooltip: { trigger: 'axis', ...commonTooltip },
                    grid: { left: '4%', right: '4%', bottom: '10%', top: '15%', containLabel: true },
                    xAxis: {
                        type: 'category', data: months,
                        axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                        axisLabel: { color: '#94a3b8' }
                    },
                    yAxis: {
                        type: 'value', axisLabel: { formatter: '{value}%', color: '#94a3b8' },
                        splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' } }
                    },
                    series: [{
                        name: config.name, type: 'line', smooth: true, symbol: 'circle', symbolSize: 8,
                        data: dataMap[config.id],
                        lineStyle: { width: 3, color: config.color },
                        itemStyle: { color: config.color, borderColor: '#fff', borderWidth: 2 },
                        areaStyle: config.area ? {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                {offset: 0, color: config.color + '33'},
                                {offset: 1, color: config.color + '00'}
                            ])
                        } : null
                    }]
                });
            });

            // AE 上报数量 (Bar)
            const aeReportChart = echarts.init(document.getElementById('aeReportChart'));
            instances.push(aeReportChart);
            aeReportChart.setOption({
                tooltip: { trigger: 'axis', ...commonTooltip },
                grid: { left: '4%', right: '4%', bottom: '10%', top: '15%', containLabel: true },
                xAxis: {
                    type: 'category', data: months,
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                    axisLabel: { color: '#94a3b8' }
                },
                yAxis: {
                    type: 'value', axisLabel: { color: '#94a3b8' },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' } }
                },
                series: [{
                    name: 'AE上报数量', type: 'bar', barWidth: '40%',
                    data: [12, 15, 18, 14, 16, 19, 22, 20, 18, 16, 14, 12],
                    itemStyle: {
                        borderRadius: [4, 4, 0, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: '#8b5cf6'},
                            {offset: 1, color: 'rgba(139, 92, 246, 0.1)'}
                        ])
                    }
                }]
            });

            // 两个饼图
            const pieConfigs = [
                { id: 'dropoutReasonChart', name: '脱落原因', data: [
                    {value: 35, name: '不良反应'}, {value: 25, name: '疗效不佳'},
                    {value: 20, name: '经济原因'}, {value: 15, name: '其他原因'}, {value: 5, name: '失访'}
                ]},
                { id: 'aeAdverseChart', name: '不良反应', data: [
                    {value: 30, name: '消化系统'}, {value: 25, name: '皮肤反应'},
                    {value: 20, name: '神经系统'}, {value: 15, name: '心血管系统'}, {value: 10, name: '其他'}
                ]}
            ];

            const colors = ['#38bdf8', '#10b981', '#f59e0b', '#f43f5e', '#8b5cf6'];

            pieConfigs.forEach(config => {
                const chart = echarts.init(document.getElementById(config.id));
                instances.push(chart);
                chart.setOption({
                    tooltip: { trigger: 'item', ...commonTooltip },
                    legend: { bottom: '0', textStyle: { color: '#94a3b8' }, icon: 'circle' },
                    series: [{
                        name: config.name, type: 'pie', radius: ['40%', '60%'], center: ['50%', '45%'],
                        avoidLabelOverlap: false,
                        itemStyle: { borderRadius: 8, borderColor: '#1e293b', borderWidth: 2 },
                        label: { show: false },
                        data: config.data.map((d, i) => ({ ...d, itemStyle: { color: colors[i % colors.length] } }))
                    }]
                });
            });

            window.addEventListener('resize', () => instances.forEach(i => i.resize()));
        };
    </script>
</body>
</html>
