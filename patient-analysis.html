<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>患者分析</title>
    <link rel="stylesheet" href="design-system.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>患者关爱 BI</h2>
        <ul class="menu">
            <li class="menu-item">
                <a href="index.html">
                    <span style="margin-right: 12px;">📊</span> 首页概览
                </a>
            </li>
            <li class="menu-item active">
                <a href="patient-analysis.html">
                    <span style="margin-right: 12px;">👥</span> 患者分析
                </a>
            </li>
            <li class="menu-item">
                <a href="follow-up-analysis.html">
                    <span style="margin-right: 12px;">📞</span> 随访分析
                </a>
            </li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="container">
            <div class="header">
                <h1>患者分析</h1>
                <div style="color: var(--text-muted); font-size: 14px;">数据更新至：2026-04-23</div>
            </div>
            
            <div class="metrics-grid">
                <div class="metric-card" style="--primary-color: #38bdf8;">
                    <div class="label">患者建档数</div>
                    <div class="value">3,456</div>
                    <div class="change positive">↑ 8.7%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #10b981;">
                    <div class="label">新患者数</div>
                    <div class="value">1,245</div>
                    <div class="change positive">↑ 15.3%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #f59e0b;">
                    <div class="label">老患者数</div>
                    <div class="value">2,211</div>
                    <div class="change positive">↑ 5.2%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #8b5cf6;">
                    <div class="label">新老患者占比</div>
                    <div class="value">36:64</div>
                    <div class="change negative">↓ 2.1%</div>
                </div>
            </div>
            
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>患者建档数量月度趋势</h3>
                    <div id="registrationTrendChart" class="chart"></div>
                </div>
                
                <div class="chart-container">
                    <h3>患者 DOT 月度趋势</h3>
                    <div id="dotTrendChart" class="chart"></div>
                </div>
            </div>
            
            <div class="footer">
                <p>© 2026 患者关爱项目管理系统 · 专业版</p>
            </div>
        </div>
    </div>

    
    <script>
        // 初始化图表
        window.onload = function() {
            // 通用配置
            const commonTooltip = {
                backgroundColor: 'rgba(30, 41, 59, 0.9)',
                borderColor: 'rgba(255, 255, 255, 0.1)',
                borderWidth: 1,
                textStyle: { color: '#f1f5f9' },
                backdropFilter: 'blur(4px)'
            };

            // 患者建档数量月度趋势图
            const registrationTrendChart = echarts.init(document.getElementById('registrationTrendChart'));
            const registrationTrendOption = {
                tooltip: {
                    trigger: 'axis',
                    ...commonTooltip
                },
                grid: {
                    left: '4%', right: '4%', bottom: '10%', top: '15%', containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                    axisLabel: { color: '#94a3b8' }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: { color: '#94a3b8' },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' } }
                },
                series: [{
                    name: '建档数量',
                    type: 'bar',
                    data: [120, 180, 220, 280, 320, 350, 380, 420, 450, 480, 520, 550],
                    barWidth: '40%',
                    itemStyle: {
                        borderRadius: [6, 6, 0, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: '#38bdf8'},
                            {offset: 1, color: 'rgba(56, 189, 248, 0.1)'}
                        ])
                    }
                }]
            };
            registrationTrendChart.setOption(registrationTrendOption);
            
            // 患者DOT月度趋势图
            const dotTrendChart = echarts.init(document.getElementById('dotTrendChart'));
            const dotTrendOption = {
                tooltip: {
                    trigger: 'axis',
                    ...commonTooltip
                },
                grid: {
                    left: '4%', right: '4%', bottom: '10%', top: '15%', containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                    axisLabel: { color: '#94a3b8' }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: { color: '#94a3b8' },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' } }
                },
                series: [{
                    name: 'DOT值',
                    type: 'line',
                    data: [65, 70, 75, 78, 82, 85, 88, 90, 92, 94, 95, 96],
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 10,
                    lineStyle: { color: '#10b981', width: 4 },
                    itemStyle: { color: '#10b981', borderColor: '#fff', borderWidth: 2 },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: 'rgba(16, 185, 129, 0.2)'},
                            {offset: 1, color: 'rgba(16, 185, 129, 0)'}
                        ])
                    }
                }]
            };
            dotTrendChart.setOption(dotTrendOption);
            
            window.addEventListener('resize', function() {
                registrationTrendChart.resize();
                dotTrendChart.resize();
            });
        };
    </script>
</body>
</html>
