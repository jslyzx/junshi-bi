<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入组分析 - 君实随访 BI</title>
    <link rel="stylesheet" href="design-system.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>君实随访 BI</h2>
        <ul class="menu">
            <li class="menu-item"><a href="index.html"><span style="margin-right:10px">📊</span> 项目数据指标</a></li>
            <li class="menu-item active"><a href="enrollment-analysis.html"><span style="margin-right:10px">📋</span> 入组分析</a></li>
            <li class="menu-item"><a href="follow-up-analysis.html"><span style="margin-right:10px">📞</span> 随访分析</a></li>
            <li class="menu-item"><a href="patient-analysis.html"><span style="margin-right:10px">👥</span> 患者分析</a></li>
            <li class="menu-item"><a href="service-analysis.html"><span style="margin-right:10px">🛎️</span> 服务数据分析</a></li>
            <li class="menu-item"><a href="safety-analysis.html"><span style="margin-right:10px">🛡️</span> 安全数据分析</a></li>
            <li class="menu-item"><a href="insight-analysis.html"><span style="margin-right:10px">💡</span> 数据洞察</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="container">
            <div class="header">
                <h1>入组分析</h1>
                <div class="date-filter">
                    <input type="date" value="2026-01-01" id="startDate">
                    <span class="separator">至</span>
                    <input type="date" id="endDate">
                    <button class="btn-apply" id="applyFilter">查询</button>
                </div>
            </div>

            <div class="metrics-grid">
                <div class="metric-card" style="--primary-color:#38bdf8"><div class="label">新入组数</div><div class="value">1,245</div><div class="change positive">↑ 12.5% 环比</div></div>
                <div class="metric-card" style="--primary-color:#10b981"><div class="label">入组转化率</div><div class="value">68.5%</div><div class="change positive">↑ 4.2%</div></div>
                <div class="metric-card" style="--primary-color:#8b5cf6"><div class="label">首周期完成率</div><div class="value">87.3%</div><div class="change positive">↑ 3.2%</div></div>
                <div class="metric-card" style="--primary-color:#f59e0b"><div class="label">首周期服务满意度</div><div class="value">4.6/5</div><div class="change positive">↑ 0.2</div></div>
            </div>

            <div class="charts-grid">
                <div class="chart-container">
                    <h3>入组量月度趋势</h3>
                    <div id="enrollTrend" class="chart"></div>
                </div>
                <div class="chart-container">
                    <h3>入组地域分布 TOP10</h3>
                    <div id="enrollRegion" class="chart"></div>
                </div>
                <div class="chart-container">
                    <h3>入组病种分布</h3>
                    <div id="enrollDisease" class="chart"></div>
                </div>
                <div class="chart-container">
                    <h3>首周期完成率趋势</h3>
                    <div id="firstCycle" class="chart"></div>
                </div>
            </div>

            <div class="footer"><p>© 2026 君实随访项目管理系统 · BI 专业版</p></div>
        </div>
    </div>

    <script>
    window.onload = function() {
        const T = {backgroundColor:'rgba(30,41,59,0.9)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,textStyle:{color:'#f1f5f9'}};
        const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        const ax = {axisLine:{lineStyle:{color:'rgba(255,255,255,0.1)'}},axisLabel:{color:'#94a3b8'}};
        const sp = {splitLine:{lineStyle:{color:'rgba(255,255,255,0.05)',type:'dashed'}}};

        const c1=echarts.init(document.getElementById('enrollTrend'));
        c1.setOption({tooltip:{trigger:'axis',...T},grid:{left:'4%',right:'4%',bottom:'8%',top:'12%',containLabel:true},
            xAxis:{type:'category',data:months,...ax},yAxis:{type:'value',...ax,...sp},
            series:[{name:'入组量',type:'bar',barWidth:'45%',data:[85,92,105,118,125,132,140,148,155,162,170,178],
                itemStyle:{borderRadius:[6,6,0,0],color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#38bdf8'},{offset:1,color:'rgba(56,189,248,0.1)'}])}}]
        });

        const c2=echarts.init(document.getElementById('enrollRegion'));
        const regions=['上海','北京','广东','江苏','浙江','山东','四川','湖北','河南','湖南'];
        c2.setOption({tooltip:{trigger:'axis',...T},grid:{left:'18%',right:'6%',bottom:'8%',top:'6%',containLabel:false},
            yAxis:{type:'category',data:regions.reverse(),...ax,axisTick:{show:false}},
            xAxis:{type:'value',...ax,...sp},
            series:[{type:'bar',data:[42,55,68,75,82,95,108,125,156,189].reverse(),barWidth:'50%',
                itemStyle:{borderRadius:[0,4,4,0],color:new echarts.graphic.LinearGradient(0,0,1,0,[{offset:0,color:'rgba(56,189,248,0.2)'},{offset:1,color:'#38bdf8'}])}}]
        });

        const c3=echarts.init(document.getElementById('enrollDisease'));
        c3.setOption({tooltip:{trigger:'item',...T},legend:{bottom:0,textStyle:{color:'#94a3b8'},icon:'circle'},
            series:[{type:'pie',radius:'65%',center:['50%','45%'],
                itemStyle:{borderColor:'#1e293b',borderWidth:1},
                label:{show:true,color:'#94a3b8',formatter:'{b}: {d}%'},
                labelLine:{lineStyle:{color:'rgba(255,255,255,0.2)'}},
                data:[
                    {value:28,name:'非小细胞肺癌',itemStyle:{color:'#38bdf8'}},
                    {value:18,name:'食管癌',itemStyle:{color:'#10b981'}},
                    {value:15,name:'鼻咽癌',itemStyle:{color:'#f59e0b'}},
                    {value:12,name:'肾癌',itemStyle:{color:'#8b5cf6'}},
                    {value:10,name:'黑色素瘤',itemStyle:{color:'#f43f5e'}},
                    {value:17,name:'其他',itemStyle:{color:'#06b6d4'}}
                ]}]
        });

        const c4=echarts.init(document.getElementById('firstCycle'));
        c4.setOption({tooltip:{trigger:'axis',...T},grid:{left:'4%',right:'4%',bottom:'8%',top:'12%',containLabel:true},
            xAxis:{type:'category',data:months,...ax},yAxis:{type:'value',axisLabel:{formatter:'{value}%',color:'#94a3b8'},...sp},
            series:[
                {name:'完成率',type:'line',smooth:true,data:[78,79,81,82,84,85,86,86.5,87,87.2,87.3,87.3],
                    lineStyle:{width:3,color:'#10b981'},itemStyle:{color:'#10b981'},symbol:'circle',symbolSize:6,
                    areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(16,185,129,0.2)'},{offset:1,color:'rgba(16,185,129,0)'}])}},
                {name:'目标线',type:'line',data:Array(12).fill(85),lineStyle:{width:2,color:'#f59e0b',type:'dashed'},symbol:'none',itemStyle:{color:'#f59e0b'}}
            ]
        });

        // 筛选按钮点击
        document.getElementById('applyFilter').addEventListener('click', function() {
            const cards = document.querySelectorAll('.metric-card');
            cards.forEach(c => c.style.opacity = '0.5');
            setTimeout(() => {
                cards.forEach(c => c.style.opacity = '1');
                alert('数据已根据日期筛选更新');
            }, 400);
        });

        // 设置默认截止日期为当天
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('endDate').value = today;

        window.addEventListener('resize',()=>{c1.resize();c2.resize();c3.resize();c4.resize()});
    };
    </script>
</body>
</html>
