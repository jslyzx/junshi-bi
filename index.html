<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <link rel="stylesheet" href="design-system.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>患者关爱 BI</h2>
        <ul class="menu">
            <li class="menu-item active">
                <a href="index.html">
                    <span style="margin-right: 12px;">📊</span> 首页概览
                </a>
            </li>
            <li class="menu-item">
                <a href="patient-analysis.html">
                    <span style="margin-right: 12px;">👥</span> 患者分析
                </a>
            </li>
            <li class="menu-item">
                <a href="follow-up-analysis.html">
                    <span style="margin-right: 12px;">📞</span> 随访分析
                </a>
            </li>
        </ul>
    </div>
    
    <div class="main-content">
        <div class="container">
            <div class="header">
                <h1>首页概览</h1>
                <div style="color: var(--text-muted); font-size: 14px;">数据更新至：2026-04-23</div>
            </div>
            
            <div class="metrics-grid">
                <div class="metric-card" style="--primary-color: #38bdf8;">
                    <div class="label">新入组数</div>
                    <div class="value">1,245</div>
                    <div class="change positive">↑ 12.5%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #10b981;">
                    <div class="label">首周期完成率</div>
                    <div class="value">87.3%</div>
                    <div class="change positive">↑ 3.2%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #f59e0b;">
                    <div class="label">第3周期完成率</div>
                    <div class="value">65.8%</div>
                    <div class="change positive">↑ 2.1%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #8b5cf6;">
                    <div class="label">5周期持续治疗率</div>
                    <div class="value">42.1%</div>
                    <div class="change negative">↓ 1.5%</div>
                </div>
                
                <div class="metric-card" style="--primary-color: #f43f5e;">
                    <div class="label">失访率</div>
                    <div class="value">12.5%</div>
                    <div class="change negative">↓ 0.8%</div>
                </div>
            </div>
            
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>治疗周期完成率月度趋势</h3>
                    <div id="completionRateChart" class="chart"></div>
                </div>
                
                <div class="chart-container">
                    <h3>患者状态分布</h3>
                    <div id="patientStatusChart" class="chart"></div>
                </div>
            </div>
            
            <div class="footer">
                <p>© 2026 患者关爱项目管理系统 · 专业版</p>
            </div>
        </div>
    </div>

    
    <script>
        // 初始化图表
        window.onload = function() {
            // 通用配置
            const commonTooltip = {
                backgroundColor: 'rgba(30, 41, 59, 0.9)',
                borderColor: 'rgba(255, 255, 255, 0.1)',
                borderWidth: 1,
                textStyle: { color: '#f1f5f9' },
                backdropFilter: 'blur(4px)'
            };

            // 治疗周期完成率趋势图
            const completionRateChart = echarts.init(document.getElementById('completionRateChart'));
            const completionRateOption = {
                tooltip: {
                    trigger: 'axis',
                    ...commonTooltip,
                    formatter: '{b}: <span style="color:#38bdf8;font-weight:700">{c}%</span>'
                },
                grid: {
                    left: '4%', right: '4%', bottom: '10%', top: '15%', containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'],
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } },
                    axisLabel: { color: '#94a3b8' }
                },
                yAxis: {
                    type: 'value',
                    axisLabel: { formatter: '{value}%', color: '#94a3b8' },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)', type: 'dashed' } }
                },
                series: [{
                    name: '完成率',
                    type: 'bar',
                    data: [45.2, 48.7, 52.3, 56.8, 61.5, 66.2, 70.8, 75.3, 79.6, 83.2, 86.5, 89.8],
                    barWidth: '40%',
                    itemStyle: {
                        borderRadius: [6, 6, 0, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            {offset: 0, color: '#38bdf8'},
                            {offset: 1, color: 'rgba(56, 189, 248, 0.1)'}
                        ])
                    },
                    emphasis: {
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                {offset: 0, color: '#7dd3fc'},
                                {offset: 1, color: 'rgba(56, 189, 248, 0.3)'}
                            ])
                        }
                    }
                }]
            };
            completionRateChart.setOption(completionRateOption);
            
            // 患者状态分布图
            const patientStatusChart = echarts.init(document.getElementById('patientStatusChart'));
            const patientStatusOption = {
                tooltip: {
                    trigger: 'item',
                    ...commonTooltip
                },
                legend: {
                    orient: 'horizontal',
                    bottom: '0',
                    textStyle: { color: '#94a3b8' },
                    icon: 'circle'
                },
                series: [{
                    name: '患者状态',
                    type: 'pie',
                    radius: ['50%', '70%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: '#1e293b',
                        borderWidth: 4
                    },
                    label: { show: false },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 18,
                            fontWeight: 'bold',
                            color: '#f1f5f9'
                        }
                    },
                    data: [
                        {value: 42.1, name: '持续治疗中', itemStyle: {color: '#38bdf8'}},
                        {value: 35.4, name: '已完成治疗', itemStyle: {color: '#10b981'}},
                        {value: 12.5, name: '失访', itemStyle: {color: '#f43f5e'}},
                        {value: 10.0, name: '中断治疗', itemStyle: {color: '#f59e0b'}}
                    ]
                }]
            };
            patientStatusChart.setOption(patientStatusOption);
            
            // 响应式调整
            window.addEventListener('resize', function() {
                completionRateChart.resize();
                patientStatusChart.resize();
            });
        };
    </script>
</body>
</html>
